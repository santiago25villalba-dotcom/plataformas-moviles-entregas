<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .content {padding: 2em 0.5em; text-align: center;}
        .s1 {background-color: #ca9f77;}
        .s2 {background-color: #cbc168;}
        .s3 {background-color: #a3c55b;}
        .s4 {background-color: #76d179;}
        .s5 {background-color: #85e3c1;}
        .s6 {background-color: #79bfe5;}
    </style>
</head>
<body>
    <div class="container-sm g-0">
        <div class="row g-0">
            <div class="col-12 col-md-8 col-lg-8 order-1">
                <div class="content s1">sección 1</div>
            </div>
            <div class="col-12 col-md-4 col-lg-4 order-4 order-md-3 order-lg-2">
                <div class="content s2">sección 2</div>
            </div>
            <div class="col-12 col-mg-4 col-lg-4 order-3 order-md-2 order-lg-3">
                <div class="content s3">sección 3</div>
            </div>
            <div class="col-12 col-mg-4 col-lg-4 order-2 order-md-4 order-lg-4">
                <div class="content s4">sección 4</div>
            </div>
            <div class="col-12 col-mg-6 col-lg-4 order-6 order-mg-5 order-lg-6">
                <div class="content s5">seccion 5</div>
            </div>
            <div class="col-12 col-mg-6 col-lg-4 order-5 order-mg-6 order-lg-5">
                <div class="content s6">seccion 6</div>
            </div>
        </div>
    </div>
</body>
</html>
